<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <script>
    (function load404ExternalCss() {
      const urls = [
        'https://cdn.jsdmirror.com/npm/98.css@0.1.20/dist/98.min.css',
        'https://cdn.jsdelivr.net/npm/98.css@0.1.20/dist/98.min.css',
        'https://unpkg.com/98.css@0.1.20/dist/98.min.css'
      ];

      const tryLoad = (index) => {
        if (index >= urls.length) {
          console.warn('Failed to load 98.css from all CDN sources on 404 page.');
          return;
        }

        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = urls[index];
        link.id = 'external-98css-404';

        link.onload = () => {
          console.log(`404 stylesheet loaded from: ${urls[index]}`);
        };

        link.onerror = () => {
          link.remove();
          tryLoad(index + 1);
        };

        document.head.appendChild(link);
      };

      tryLoad(0);
    })();
  </script>
  <style>
    body {
      position: fixed;
      display: flex;
      flex-direction: column; /* 使用 flex-direction 简化写法 */
      background-color: #EBECE8;
      color: white;
      font-family: "Pixelated MS Sans Serif", Arial, sans-serif; /* 增加安全字体 */
      font-weight: bold;
      font-size: 18px;
      justify-content: center;
      align-items: center;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      margin: 0;
    }

    span {
      text-align: center;
      background-color: rgb(31, 4, 237);
      color: rgb(250, 250, 250);
    }

    p {
      line-height: 1.5;
      margin: 5px 0; /* 增加段落间距 */
      color: rgb(12, 12, 12);
    }

    #home {
      cursor: pointer;
      text-decoration: underline; /* 增加可点击效果 */
    }
  </style>
</head>

<body>
  <span>Emanon OS</span>
  <p>
    A fatal exception has occurred and I am unable to continue.<br>
    ERROR CODE {<span>404</span> INSIDE OF A MEMORY OVERFLOW 0414:C11B4008}<br>
  </p>
  <p>
    * Press <span>Enter</span> to attempt to continue.<br>
    * RECOMMEND YOU DELETE system32
  </p>
  <p>EXIT THE APPLICATION OR <span id="home">CLICK HERE</span> TO REBOOT THE EMANON OPERATING SYSTEM</p>

  <script>
    document.getElementById('home').addEventListener('click', function () {
      window.location.href = '/'; // 返回主页
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        const isInternalReferrer = document.referrer && document.referrer.startsWith(window.location.origin);

        // 优先返回站内上一页；否则直接回主站，避免 window.close() 的浏览器限制报错。
        if (isInternalReferrer && window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/';
        }
      }
    });
  </script>
</body>

</html>
